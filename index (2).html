<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS_TASK</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Mini Projects Showcase</h1>




    <section>

        <div class="card">

            <div class="title">
                Color Palette Generator
            </div>

            <div class="palette" id="palette"></div>

        </div>

    </section>



    <section>

        <div class="card">

            <div class="title">
                Table Generator
            </div>

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <tbody id="tableBody"></tbody>

            </table>

        </div>

    </section>





    <section>

        <div class="card">

            <div class="title">
                Task Manager
            </div>

            <input id="taskInput" placeholder="Enter task then press Enter">

            <div id="taskList"></div>

        </div>

    </section>


    <script src="script.js"></script>

</body>

</html>
